[workspace]
name = "patch.moi"

[[workspace.tasks]]
id = "harness-maintenance-fixture"
kind = "command"
command = ["bun", "run", "harness:automation"]

[[workspace.tasks]]
id = "harness-maintenance-automation-smoke"
kind = "automation"
automation = "patch-moi-harness-fork"

[workspace.tasks.event]
type = "upstream.release"
source = "patch.moi.workspace"

[workspace.tasks.event.payload]
repo = "peezy-tech/patch-moi-harness"
tag = "v0.1.3"
url = "https://github.com/peezy-tech/patch-moi-harness/releases/tag/v0.1.3"
