name: check

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: bun
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run check:types
      - name: Test
        run: bun test
      - name: Build container
        run: docker build -t git-webhooks:ci .
